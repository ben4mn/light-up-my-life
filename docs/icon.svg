<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#2d2d44"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#F2A900"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Sun body -->
  <circle cx="64" cy="64" r="18" fill="url(#sun)" filter="url(#glow)"/>
  <!-- Sun rays -->
  <g stroke="url(#sun)" stroke-width="3" stroke-linecap="round" filter="url(#glow)">
    <line x1="64" y1="32" x2="64" y2="38"/>
    <line x1="64" y1="90" x2="64" y2="96"/>
    <line x1="32" y1="64" x2="38" y2="64"/>
    <line x1="90" y1="64" x2="96" y2="64"/>
    <line x1="41.4" y1="41.4" x2="45.6" y2="45.6"/>
    <line x1="82.4" y1="82.4" x2="86.6" y2="86.6"/>
    <line x1="41.4" y1="86.6" x2="45.6" y2="82.4"/>
    <line x1="82.4" y1="45.6" x2="86.6" y2="41.4"/>
  </g>
</svg>
