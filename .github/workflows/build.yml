name: Build & Deploy

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: Build DMG
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app
        run: ./build.sh

      - name: Create DMG
        run: |
          DMG_DIR=".build/dmg-staging"
          mkdir -p "$DMG_DIR"
          cp -R ".build/Light Up My Life.app" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create \
            -volname "Light Up My Life" \
            -srcfolder "$DMG_DIR" \
            -ov \
            -format UDZO \
            "LightUpMyLife.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: LightUpMyLife-dmg
          path: LightUpMyLife.dmg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Light Up My Life ${{ github.ref_name }}" \
            --generate-notes \
            LightUpMyLife.dmg

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
